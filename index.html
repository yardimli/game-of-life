<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>EvoGrid: Red vs Blue</title>
	<link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div id="game-container">
	<!-- Left Panel: UI -->
	<div id="left-panel">
		<h1>EvoGrid</h1>
		
		<div class="panel-section">
			<h3>Global Stats</h3>
			<div style="display: flex; justify-content: space-between; font-size: 14px;">
				<span>Cycle: <span id="stat-cycle">0</span></span>
				<span>Blues: <span id="stat-blues" style="color: #4da6ff;">0</span></span>
				<span>Reds: <span id="stat-reds" style="color: #ff4d4d;">0</span></span>
				<span>FPS: <span id="stat-fps">0</span></span>
			</div>
		</div>
		
		<div class="panel-section">
			<h3>Simulation Controls</h3>
			<div class="button-group">
				<button id="btn-play" class="btn-success">Play</button>
				<button id="btn-pause" class="btn-warning">Pause</button>
				<button id="btn-reset" class="btn-danger">Reset</button>
				<button id="btn-clear" class="btn-info">Clear Map</button>
			</div>
			
			<hr style="border-color:#444; margin: 15px 0;">
			
			<label>Click Action:</label>
			<select id="set-click-action">
				<option value="select" selected>Select / Inspect</option>
				<option value="red">Draw Red</option>
				<option value="blue">Draw Blue</option>
				<option value="food">Draw Food</option>
				<option value="blank">Eraser (Blank)</option>
			</select>
			
			<label>Clock Speed: <span id="val-speed">1.0</span>x</label>
			<input type="range" id="set-speed" min="0.1" max="5" step="0.1" value="1">
			
			<label>Photosynthesis Energy: <span id="val-photo">1.0</span></label>
			<input type="range" id="set-photo" min="0" max="5" step="0.1" value="1">
			
			<label>Mutation Volatility: <span id="val-mutation">0.5</span></label>
			<input type="range" id="set-mutation" min="0" max="2" step="0.1" value="0.5">
			
			<label>Corpse Energy: <span id="val-corpse-energy">100%</span></label>
			<input type="range" id="set-corpse-energy" min="0" max="500" step="10" value="100">
			
			<!-- Modified: Added toggle button and adjusted range for 0.01 to 5.0 -->
			<label>
				Random Food: <span id="val-food-rate">1.00 / turn</span>
				<button id="btn-toggle-food" class="btn-tiny btn-success">ON</button>
			</label>
			<input type="range" id="set-food-rate" min="0.01" max="5" step="0.01" value="1">
			
			<p class="hint">Hint: Click and drag on the map to interact.</p>
		</div>
		
		<div class="panel-section" id="inspector">
			<h3>Selected Entity</h3>
			<div id="inspector-content">
				<p>Select an entity on the map.</p>
			</div>
		</div>
	</div>
	
	<!-- Right Panel: PixiJS Canvas -->
	<div id="canvas-container"></div>
</div>

<!-- Main Game Logic -->
<script type="module" src="/src/main.js"></script>
</body>
</html>
